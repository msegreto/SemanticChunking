experiment_name: robust04_FIXED_02
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/robust04
  data_dir: data/raw/beir/robust04
  normalized_dir: data/normalized/beir/robust04
  split: test
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/robust04/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: fixed
  dataset: robust04
  save_chunks: false
  n_chunks: 5
  overlap_sentences: 0
embedding:
  name: stella
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true
retrieval:
  enabled: true
  name: faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: hf_causal_lm
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
