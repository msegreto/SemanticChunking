experiment_name: "baseline_pipeline"
evaluation_profile: default
execution_profile: default

dataset:
  name: "beir/fiqa"
  data_dir: "data/raw/fiqa"
  split: "dev"
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/fiqa/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: semantic_breakpoint
  dataset: fiqa
  save_chunks: false

embedding:
  name: "mpnet"
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  extrinsic_tasks_to_run: [document_retrieval]
