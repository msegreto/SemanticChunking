experiment_name: "semantic_clustering_pipeline"
evaluation_profile: default
execution_profile: default

dataset:
  name: "beir/fiqa"
  data_dir: "data/raw/fiqa"
  split: "dev"
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/fiqa/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: semantic_clustering
  dataset: fiqa
  save_chunks: false
  clustering_mode: single_linkage
  lambda: 0.5
  number_of_chunks: 4
  stop_distance_threshold: 0.5
  allow_non_contiguous_chunks: true
  dbscan_eps: 0.3
  dbscan_min_samples: 2

embedding:
  name: "mpnet"
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  extrinsic_tasks_to_run: [document_retrieval]
