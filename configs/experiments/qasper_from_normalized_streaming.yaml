experiment_name: "qasper_normalized_pipeline_streaming"
evaluation_profile: default
execution_profile: default

execution:
  streaming_docs_per_run: 100

dataset:
  name: "beir/qasper"
  normalized_dir: "data/normalized/beir/qasper"
  split: "test"
  download_if_missing: false
  use_normalized_if_available: true
  save_normalized: false
  required_extrinsic_tasks: [document_retrieval, evidence_retrieval, answer_generation]

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/qasper/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: semantic_breakpoint
  dataset: qasper
  # n_chunks: 3
  # overlap_sentences: 0
  save_chunks: false

embedding:
  name: "mpnet"
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  extrinsic_tasks_to_run: [document_retrieval, evidence_retrieval, answer_generation]
  extrinsic_tasks:
    answer_generation:
      ks: [5]
