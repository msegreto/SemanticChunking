experiment_name: techqa_DBSCAN_05
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/techqa
  data_dir: data/raw/beir/techqa
  normalized_dir: data/normalized/beir/techqa
  split: test
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/techqa/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: semantic_clustering
  dataset: techqa
  save_chunks: false
  embedding_model: mpnet
  embedding_batch_size: 64
  similarity_metric: cosine
  show_embedding_progress: false
  clustering_mode: dbscan
  lambda: 1.0
  dbscan_eps: 0.5
  dbscan_min_samples: 5
embedding:
  name: mpnet
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: true
  name: faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: hf_causal_lm
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
