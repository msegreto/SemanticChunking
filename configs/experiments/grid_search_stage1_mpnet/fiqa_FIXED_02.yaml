experiment_name: fiqa_FIXED_02
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/fiqa
  normalized_dir: data/normalized/beir/fiqa
  split: test
  download_if_missing: true
split:
  type: sentence
  model: en_core_web_sm
  output_path: data/processed/fiqa/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: fixed
  dataset: fiqa
  save_chunks: false
  n_chunks: 5
  overlap_sentences: 0
embedding:
  name: mpnet
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: true
  backend: dense_faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: hf_causal_lm
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
  extrinsic_tasks:
    answer_generation:
      reader_backend: seq2seqlm
      reader_model: google/flan-t5-base
      top_k: 5
