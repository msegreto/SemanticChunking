experiment_name: techqa_SLINK_03
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/techqa
  normalized_dir: data/normalized/beir/techqa
  split: test
  download_if_missing: true
split:
  type: sentence
  model: en_core_web_sm
  output_path: data/processed/techqa/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: semantic_clustering
  dataset: techqa
  save_chunks: false
  embedding_model: mpnet
  embedding_batch_size: 64
  similarity_metric: cosine
  show_embedding_progress: false
  clustering_mode: single_linkage
  lambda: 0.5
  number_of_chunks: 5
  stop_distance_threshold: 0.5
embedding:
  name: mpnet
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: true
  backend: dense_faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: hf_causal_lm
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
  extrinsic_tasks:
    answer_generation:
      reader_backend: seq2seqlm
      reader_model: google/flan-t5-base
      top_k: 5
