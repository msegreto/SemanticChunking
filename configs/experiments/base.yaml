experiment_name: "baseline_pipeline"

execution:
  streaming: true
  streaming_docs_per_run: 100000
  streaming_run_until_complete: true
  allow_reuse: true
  force_rebuild: false
  stages:
    dataset:
      allow_reuse: true
      force_rebuild: false
    split:
      allow_reuse: true
      force_rebuild: false
    chunking:
      allow_reuse: true
      force_rebuild: false
    retrieval:
      allow_reuse: true
      force_rebuild: false

dataset:
  name: "beir/fiqa"
  data_dir: "data/raw/fiqa"
  split: "dev"
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
  required_extrinsic_tasks: [document_retrieval, evidence_retrieval, answer_generation]

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/fiqa/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: fixed
  dataset: fiqa
  n_chunks: 3
  overlap_sentences: 0
  save_chunks: true

embedding:
  name: "mpnet"
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  intrinsic: true
  intrinsic_evaluator: default

  intrinsic_metrics:
    boundary_clarity: true
    chunk_stickiness: true

  intrinsic_model:
    backend: lexical # or hf_causal_lm 
    name: sshleifer/tiny-gpt2 # distil-gpt2 or sshleifer/tiny-gpt2 or gpt2
    device: auto
    max_length: 1024
    trust_remote_code: false
    edge_threshold: 0.0
    sequential_delta: 0
  
  save:
    enabled: true
    yaml_name: fiqa_intrinsic_results

  extrinsic: true
  extrinsic_evaluator: document_retrieval
  extrinsic_tasks_to_run: [document_retrieval, evidence_retrieval, answer_generation]
  results_dir: results/extrinsic
  extrinsic_tasks:
    document_retrieval:
      ks: [1, 3, 5, 10]
      normalized_dataset_dir: data/normalized/beir/fiqa
      split: dev
      query_sample_size: 100
      query_sample_seed: 42
    evidence_retrieval:
      ks: [1, 3, 5, 10]
      evidence_path: null
    answer_generation:
      ks: [1, 3, 5, 10]
      answers_path: null
      generation_model:
        name: null
