experiment_name: "baseline_pipeline"
evaluation_profile: default
execution_profile: default

dataset:
  name: "beir/fiqa"
  data_dir: "data/raw/fiqa"
  split: "dev"
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
  required_extrinsic_tasks: [document_retrieval, evidence_retrieval, answer_generation]

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/fiqa/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: fixed
  dataset: fiqa
  n_chunks: 3
  overlap_sentences: 0
  save_chunks: true

embedding:
  name: "mpnet"
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  extrinsic_tasks_to_run: [document_retrieval, evidence_retrieval, answer_generation]
