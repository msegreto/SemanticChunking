experiment_name: "techqa_normalized_pipeline"
evaluation_profile: default
execution_profile: default

dataset:
  name: "beir/techqa"
  normalized_dir: "data/normalized/beir/techqa"
  split: "test"
  source_split: "test"
  hf_dataset: "PrimeQA/TechQA"
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: false
  required_extrinsic_tasks: [document_retrieval, evidence_retrieval, answer_generation]

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/techqa/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: fixed
  dataset: techqa
  n_chunks: 3
  overlap_sentences: 0
  save_chunks: false

embedding:
  name: "mpnet"
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  extrinsic_tasks_to_run: [document_retrieval, evidence_retrieval, answer_generation]
  extrinsic_tasks:
    answer_generation:
      ks: [5]
