experiment_name: "qasper_normalized_pipeline"

execution:
  streaming: true
  streaming_docs_per_run: 100000
  streaming_run_until_complete: true
  allow_reuse: true
  force_rebuild: false
  stages:
    dataset:
      allow_reuse: true
      force_rebuild: false
    split:
      allow_reuse: true
      force_rebuild: false
    chunking:
      allow_reuse: true
      force_rebuild: false
    retrieval:
      allow_reuse: true
      force_rebuild: false

dataset:
  name: "beir/qasper"
  normalized_dir: "data/normalized/beir/qasper"
  split: "test"
  download_if_missing: false
  use_normalized_if_available: true
  save_normalized: false
  required_extrinsic_tasks: [document_retrieval, evidence_retrieval, answer_generation]

split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/qasper/sentences.jsonl

router:
  enabled: false
  name: "moc"

chunking:
  type: fixed
  dataset: qasper
  n_chunks: 3
  overlap_sentences: 0
  save_chunks: false

embedding:
  name: "mpnet"
  batch_size: 32
  normalize_embeddings: true
  show_progress_bar: true

retrieval:
  enabled: true
  name: "numpy"
  distance: "cosine"
  normalize: true

evaluation:
  intrinsic: true
  intrinsic_evaluator: default

  intrinsic_metrics:
    boundary_clarity: true
    chunk_stickiness: true

  intrinsic_model:
    backend: lexical
    name: sshleifer/tiny-gpt2
    device: auto
    max_length: 1024
    trust_remote_code: false
    edge_threshold: 0.0
    sequential_delta: 0

  save:
    enabled: true
    yaml_name: qasper_intrinsic_results

  extrinsic: true
  extrinsic_evaluator: document_retrieval
  extrinsic_tasks_to_run: [document_retrieval, evidence_retrieval, answer_generation]
  results_dir: results/extrinsic
  extrinsic_tasks:
    document_retrieval:
      ks: [1, 3, 5, 10]
      normalized_dataset_dir: data/normalized/beir/qasper
      split: test
      query_sample_size: 100
      query_sample_seed: 42
    evidence_retrieval:
      ks: [1, 3, 5, 10]
      evidence_path: data/normalized/beir/qasper/evidences.json
    answer_generation:
      ks: [1, 3, 5, 10]
      answers_path: data/normalized/beir/qasper/answers.json
      generation_model:
        name: dummy-qasper-model
