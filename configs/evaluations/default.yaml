evaluation:
  intrinsic: true
  intrinsic_evaluator: default

  intrinsic_metrics:
    boundary_clarity: true
    chunk_stickiness: true

  intrinsic_model:
    backend: lexical
    name: gpt2-large
    device: auto
    max_length: 1024
    trust_remote_code: false
    edge_threshold: 0.0
    sequential_delta: 0

  save:
    enabled: true

  extrinsic: true
  extrinsic_evaluator: document_retrieval
  extrinsic_tasks_to_run: [document_retrieval]
  results_dir: results/extrinsic
  extrinsic_tasks:
    document_retrieval:
      ks: [1, 3, 5, 10]
      query_sample_size: 100
      query_sample_seed: 42
    evidence_retrieval:
      ks: [1, 3, 5, 10]
    answer_generation:
      ks: [1, 3, 5, 10]
      generation_model:
        name: null
