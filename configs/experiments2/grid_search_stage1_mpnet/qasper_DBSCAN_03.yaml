experiment_name: qasper_DBSCAN_03
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/qasper
  normalized_dir: data/normalized/beir/qasper
  split: test
  download_if_missing: true
split:
  type: sentence
  model: en_core_web_sm
  output_path: data/processed/qasper/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: semantic_clustering
  dataset: qasper
  save_chunks: false
  embedding_model: mpnet
  embedding_batch_size: 64
  similarity_metric: cosine
  show_embedding_progress: false
  clustering_mode: dbscan
  lambda: 0.5
  dbscan_eps: 0.3
  dbscan_min_samples: 2
embedding:
  name: mpnet
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: true
  backend: dense_faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: lexical
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
  extrinsic_tasks:
    answer_generation:
      reader_backend: seq2seqlm
      reader_model: google/flan-t5-base
      top_k: 5
