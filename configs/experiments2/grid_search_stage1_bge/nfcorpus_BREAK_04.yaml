experiment_name: nfcorpus_BREAK_04
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/nfcorpus
  data_dir: data/raw/beir/nfcorpus
  normalized_dir: data/normalized/beir/nfcorpus
  split: test
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
split:
  type: sentence
  model: en_core_web_sm
  save_output: true
  output_path: data/processed/nfcorpus/sentences.jsonl
router:
  enabled: false
  name: moc
chunking:
  type: semantic_breakpoint
  dataset: nfcorpus
  save_chunks: false
  embedding_model: bge
  embedding_batch_size: 64
  similarity_metric: cosine
  show_embedding_progress: false
  threshold_type: gradient
  threshold_value: 30
embedding:
  name: bge
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: true
  name: faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic_model:
    backend: lexical
  extrinsic_tasks_to_run:
  - document_retrieval
  - evidence_retrieval
  - answer_generation
