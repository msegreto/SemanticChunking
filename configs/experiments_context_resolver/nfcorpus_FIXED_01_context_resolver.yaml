experiment_name: nfcorpus_FIXED_01_context_resolver
evaluation_profile: default
execution_profile: default
dataset:
  name: beir/nfcorpus
  data_dir: data/raw/beir/nfcorpus
  normalized_dir: data/normalized/beir/nfcorpus
  split: test
  download_if_missing: true
  use_normalized_if_available: true
  save_normalized: true
split:
  type: contextualizer
  model: en_core_web_sm
  save_output: true
  output_path: data/processed_context/nfcorpus/sentences_context_resolver.jsonl
  context_resolver:
    enabled: true
    backend: hf_remote
    endpoint_url: https://api-inference.huggingface.co/models/google/flan-t5-large
    max_input_chars: 3000
    temperature: 0.0
    do_sample: false
    return_full_text: false
    timeout_seconds: 45
    max_retries: 2
    retry_backoff_seconds: 1.0
    fail_on_error: false
router:
  enabled: false
  name: moc
chunking:
  type: fixed
  dataset: nfcorpus
  save_chunks: false
  n_chunks: 3
  overlap_sentences: 0
embedding:
  name: bge
  batch_size: 64
  normalize_embeddings: true
  show_progress_bar: false
retrieval:
  enabled: false
  name: faiss
  distance: cosine
  normalize: true
evaluation:
  intrinsic: false
  extrinsic: false
execution:
  streaming_docs_per_run: 50
  streaming_run_until_complete: false
